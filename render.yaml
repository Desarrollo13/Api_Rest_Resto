# render.yaml
services:
  - type: web
    name: restaurante-api
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn restaurant.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: restaurante-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: restaurante-db
    databaseName: restaurante
    user: restaurante